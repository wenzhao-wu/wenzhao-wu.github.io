---
layout: default
---
<article class="article">
  <header class="article-header">
    <h1 class="article-title">{{ page.title }}</h1>
    <div class="article-meta">
      <span>{{ page.date | date: "%Y年%m月%d日" }}</span>
    </div>
  </header>

  <div class="article-content">
    {{ content }}
  </div>

  <footer class="article-watermark">
    <div class="watermark-source">📖 {{ site.title }}</div>
    <div class="watermark-subtitle">{{ site.subtitle }}</div>
    <div class="watermark-meta">发布于 {{ page.date | date: "%Y年%m月%d日" }}</div>
    <div class="watermark-meta">{{ site.url }}{{ page.url }}</div>
  </footer>
</article>

<nav class="post-nav">
  <a href="{{ '/' | relative_url }}">← 返回首页</a>
</nav>
