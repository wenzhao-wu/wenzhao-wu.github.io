---
layout: default
---
<article class="article">
  <header class="article-header">
    <h1 class="article-title">{{ page.title }}</h1>
    <div class="article-meta">
      <span>{{ page.date | date: "%Y年%m月%d日" }}</span>
    </div>
  </header>

  <div class="article-content">
    {{ content }}
  </div>

  <footer class="article-watermark">
    <div class="watermark-source">📖 {{ site.title }}</div>
    <div class="watermark-subtitle">{{ site.subtitle }}</div>
    <div class="watermark-meta">发布于 {{ page.date | date: "%Y年%m月%d日" }}</div>
    <div class="watermark-meta">{{ site.url }}{{ page.url }}</div>
  </footer>
</article>

<nav class="post-nav">
  <a href="{{ '/' | relative_url }}">← 返回首页</a>
  <button class="btn-export" onclick="exportArticle()">📤 导出分享</button>
</nav>

<script>
function exportArticle() {
  var title = '{{ page.title | escape }}';
  var date = '{{ page.date | date: "%Y年%m月%d日" }}';
  var blogName = '{{ site.title | escape }}';
  var subtitle = '{{ site.subtitle | escape }}';
  var content = document.querySelector('.article-content').innerHTML;

  var html = '<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n<meta charset="UTF-8">\n';
  html += '<meta name="viewport" content="width=device-width,initial-scale=1.0">\n';
  html += '<title>' + title + ' - ' + blogName + '</title>\n';
  html += '<style>';
  html += '*{box-sizing:border-box;margin:0;padding:0}body{font-family:"Songti SC","STSong","SimSun",serif;background:#fafaf8;color:#2c2c2c;line-height:1.9}.container{max-width:780px;margin:0 auto;padding:40px 24px}.article-header{text-align:center;padding:40px 0 32px;border-bottom:1px solid #e0e0dc;margin-bottom:36px}.blog-name{font-size:14px;color:#8b5e3c;letter-spacing:2px;margin-bottom:4px}.blog-subtitle{font-size:12px;color:#aaa}.article-title{font-size:28px;font-weight:700;line-height:1.3;margin-bottom:12px}.article-date{font-size:14px;color:#999}.article-cover{max-width:100%;border-radius:8px;margin-bottom:28px}.article-content{font-size:17px;color:#333}.article-content p{margin-bottom:1.2em}.article-content h2,.article-content h3{margin-top:1.8em;margin-bottom:.8em}.article-content img{max-width:100%;border-radius:6px;margin:16px 0}.article-content blockquote{border-left:3px solid #8b5e3c;padding-left:16px;color:#666;margin:1em 0}.article-content pre{background:#f5f5f5;padding:16px;border-radius:6px;overflow-x:auto;font-size:14px}.article-content code{background:#f0f0f0;padding:2px 6px;border-radius:3px}.watermark{margin-top:48px;padding-top:24px;border-top:2px solid #e8e8e4;text-align:center;font-size:13px;color:#999;line-height:2}.watermark::before{content:"— ◆ —";display:block;color:#ccc;font-size:12px;margin-bottom:12px;letter-spacing:4px}.watermark .source{font-weight:600;color:#8b5e3c;font-size:15px}';
  html += '@media print{body{background:#fff}.container{max-width:100%}}@media(max-width:640px){.article-title{font-size:22px}.container{padding:20px 16px}}</style>\n</head>\n<body>\n<div class="container">\n';
  html += '<div class="article-header"><div class="blog-name">' + blogName + '</div><div class="blog-subtitle">' + subtitle + '</div></div>\n';
  html += '<h1 class="article-title">' + title + '</h1>\n';
  html += '<p class="article-date" style="text-align:center;color:#999;margin-bottom:24px;">' + date + '</p>\n';
  html += '<div class="article-content">' + content + '</div>\n';
  html += '<div class="watermark"><div class="source">📖 ' + blogName + '</div><div style="font-size:12px;color:#bbb;">' + date + '</div></div>\n';
  html += '</div>\n</body>\n</html>';

  var blob = new Blob([html], {type: 'text/html;charset=UTF-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = title.replace(/[\\/:*?"<>|]/g,'_').slice(0,50) + '.html';
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
