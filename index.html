---
layout: default
title: 文章
---

<div class="home">
  {% if site.posts.size == 0 %}
  <div class="empty-state">
    <p>还没有文章。</p>
  </div>
  {% else %}

  <div class="post-list">
    {% for post in site.posts %}
    <a href="{{ post.url | relative_url }}" class="post-card {% if post.cover %}has-cover{% endif %}">
      {% if post.cover %}
      <img class="post-card-cover" src="{{ post.cover | relative_url }}" alt="" loading="lazy">
      {% endif %}
      <div class="post-card-body">
        <h2 class="post-title">{{ post.title }}</h2>
        <p class="post-excerpt">{{ post.excerpt | strip_html | truncate: 150 }}</p>
        <div class="post-meta">{{ post.date | date: "%Y-%m-%d" }}</div>
      </div>
    </a>
    {% endfor %}
  </div>
  {% endif %}
</div>
